events {}

http {
  # Redirigir todo HTTP → HTTPS
  server {
    listen 80;
    server_name coach.iawiki.app api.iawiki.app;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # Frontend
  server {
    listen 443 ssl;
    server_name coach.iawiki.app;

    ssl_certificate     /etc/letsencrypt/live/coach.iawiki.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coach.iawiki.app/privkey.pem;

    location / {
      proxy_pass         http://frontend:3000;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }

  # Backend API
  server {
    listen 443 ssl;
    server_name api.iawiki.app;

    ssl_certificate     /etc/letsencrypt/live/coach.iawiki.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coach.iawiki.app/privkey.pem;

    # SSE — desactivar buffering para streaming del coach
    location /api/coach/chat {
      proxy_pass         http://backend:4000;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_buffering    off;
      proxy_cache        off;
      proxy_read_timeout 300s;
    }

    location / {
      proxy_pass         http://backend:4000;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
